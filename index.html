<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiprop — Tu Match Inmobiliario</title>
    <meta name="description" content="Swiprop - Tu Match Inmobiliario. Algo grande est&aacute; por llegar.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --teal: #3CBBB1;
            --purple: #7B6B9E;
            --orange: #F28C38;
            --yellow: #F5C542;
            --dark-bg: #0D1B2A;
            --dark-surface: #132238;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--dark-bg);
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Subtle animated background particles */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-particles::before,
        .bg-particles::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.08;
            animation: float 20s ease-in-out infinite;
        }

        .bg-particles::before {
            width: 600px;
            height: 600px;
            background: linear-gradient(135deg, var(--teal), var(--purple));
            top: -200px;
            left: -200px;
        }

        .bg-particles::after {
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, var(--orange), var(--yellow));
            bottom: -150px;
            right: -150px;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(60px, -40px) scale(1.05); }
            66% { transform: translate(-30px, 30px) scale(0.95); }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 24px;
        }

        /* Logo Section */
        .logo-section {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeInUp 1s ease-out;
        }

        .logo-text {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--teal), var(--purple), var(--orange), var(--yellow));
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 6s ease-in-out infinite;
        }

        .tagline {
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 8px;
        }

        /* Gradient line under logo */
        .gradient-line {
            width: 200px;
            height: 2px;
            margin: 16px auto 0;
            background: linear-gradient(90deg, var(--teal), var(--purple), var(--orange));
            border-radius: 2px;
            opacity: 0.6;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Video Section */
        .video-section {
            width: 100%;
            max-width: 900px;
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 */
            border-radius: 16px;
            overflow: hidden;
            background: var(--dark-surface);
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.05),
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(60, 187, 177, 0.06),
                0 0 80px rgba(242, 140, 56, 0.06);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Video thumbnail fallback */
        .video-thumbnail {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            background: #000;
            transition: opacity 0.3s ease;
        }

        .video-thumbnail img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.85;
            transition: opacity 0.3s ease;
        }

        .video-thumbnail:hover img {
            opacity: 1;
        }

        .play-button {
            position: relative;
            z-index: 2;
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .video-thumbnail:hover .play-button {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            transform: scale(1.1);
        }

        .play-button svg {
            width: 32px;
            height: 32px;
            margin-left: 4px;
            fill: #fff;
        }

        /* Coming Soon text */
        .coming-soon {
            margin-top: 48px;
            text-align: center;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .coming-soon p {
            font-size: 1.1rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        /* Pulse dot */
        .pulse-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--teal);
            border-radius: 50%;
            margin-left: 12px;
            vertical-align: middle;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(60, 187, 177, 0.4); }
            50% { opacity: 0.6; box-shadow: 0 0 0 12px rgba(60, 187, 177, 0); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Footer */
        .footer {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 32px 24px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.8rem;
            font-weight: 300;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo-text {
                font-size: 2.2rem;
            }

            .tagline {
                font-size: 0.8rem;
                letter-spacing: 3px;
            }

            .video-section {
                max-width: 100%;
            }

            .video-wrapper {
                border-radius: 12px;
            }

            .coming-soon p {
                font-size: 0.9rem;
                letter-spacing: 4px;
            }

            .container {
                padding: 32px 16px;
            }
        }

        @media (max-width: 480px) {
            .logo-text {
                font-size: 1.8rem;
            }

            }
    </style>
</head>
<body>
    <div class="bg-particles"></div>

    <main class="container">
        <!-- Logo -->
        <div class="logo-section">
            <div class="logo-text">Swiprop</div>
            <div class="tagline">Tu Match Inmobiliario</div>
            <div class="gradient-line"></div>
        </div>

        <!-- Video -->
        <div class="video-section">
            <div class="video-wrapper">
                <iframe
                    src="https://www.youtube-nocookie.com/embed/S3UrRql7Wio?rel=0&modestbranding=1"
                    title="Swiprop - Coming Soon"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    referrerpolicy="no-referrer"
                    allowfullscreen>
                </iframe>
            </div>
        </div>

        <!-- Coming Soon -->
        <div class="coming-soon">
            <p>Pr&oacute;ximamente<span class="pulse-dot"></span></p>
        </div>
    </main>

    <footer class="footer">
        &copy; 2026 Swiprop. Todos los derechos reservados.
    </footer>
</body>
</html>
